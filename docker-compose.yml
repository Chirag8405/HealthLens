services:
  postgres:
    image: postgres:16-alpine
    container_name: healthlens-postgres
    environment:
      POSTGRES_DB: healthlens
      POSTGRES_USER: healthlens
      POSTGRES_PASSWORD: healthlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthlens -d healthlens"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: healthlens-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://healthlens:healthlens@postgres:5432/healthlens
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./archive:/app/archive:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: healthlens-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
